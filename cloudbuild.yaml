steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/task-manager-web-app/tasker-api:$COMMIT_SHA', 
      '.'
    ]

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/task-manager-web-app/tasker-api:$COMMIT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tasker-backend'
      - '--image'
      - 'europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/task-manager-web-app/tasker-api:$COMMIT_SHA'
      - '--region'
      - 'europe-west4'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/task-manager-web-app/tasker-api:$COMMIT_SHA'